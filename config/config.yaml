# ═══════════════════════════════════════════════════════════════
#                    TrendRadar 配置文件 (全网商业与求职侦察版)
# ═══════════════════════════════════════════════════════════════

app:
  timezone: "Asia/Shanghai"
  show_version_update: true

schedule:
  enabled: false
  preset: "custom"      # 👈 把 "morning_evening" 改成 "custom"

# ===============================================================
# 2. 数据源 - 热榜平台 (精简保留高净值流量池)
# ===============================================================
platforms:
  enabled: true
  sources:
    - id: "bilibili-hot-search"
      name: "B站热搜"
    - id: "zhihu"
      name: "知乎"
    - id: "weibo"
      name: "微博"

# ===============================================================
# 3. 数据源 - RSS 订阅 (你的 15 大金牌智库)
# ===============================================================
rss:
  enabled: true
  freshness_filter:
    enabled: true
    max_age_days: 1   # 🚨 极度关键：只抓最近24小时的内容

  feeds:
    # 🎯 战队一：全网流量基本盘
    - id: "xhs-global-trending"
      name: "🔥小红书-全网热搜"
      url: "https://my-rsshub-rust.vercel.app/xiaohongshu/trending"

    - id: "xhs-student-search"
      name: "🎓小红书-大学生实习"
      url: "https://my-rsshub-rust.vercel.app/xiaohongshu/search/大学生实习/hot"

    - id: "competitor-uncareer"
      name: "🚨竞品监控-uncareer"
      url: "https://my-rsshub-rust.vercel.app/xiaohongshu/search/uncareer/hot"

    - id: "sv101"
      name: "💡智库-硅谷101"
      url: "https://my-rsshub-rust.vercel.app/xiaoyuzhou/podcast/5e77757d418a84a04620ec42"

    - id: "xinzhiyuan"
      name: "💡智库-新智元"
      url: "https://my-rsshub-rust.vercel.app/zhihu/people/xin-zhi-yuan-84-75/posts"

    - id: "deeptech"
      name: "💡智库-Deeptech深科技"
      url: "https://my-rsshub-rust.vercel.app/zhihu/people/deeptechshen-ke-ji/posts"

    - id: "jiazi"
      name: "💡智库-甲子光年"
      url: "https://my-rsshub-rust.vercel.app/zhihu/people/jia-zi-guang-nian/posts"

    - id: "huxiu-article"
      name: "💡智库-虎嗅精选"
      url: "https://my-rsshub-rust.vercel.app/huxiu/article"

    - id: "baobian"
      name: "💡智库-豹变"
      url: "https://my-rsshub-rust.vercel.app/zhihu/people/bao-bian-34/posts"

    - id: "42zhangjing"
      name: "💡智库-42章经"
      url: "https://my-rsshub-rust.vercel.app/zhihu/people/42zhang-jing-71/posts"

    - id: "ceibs"
      name: "💡智库-中欧商业评论"
      url: "https://my-rsshub-rust.vercel.app/zhihu/people/zhong-ou-shang-ye-ping-lun/posts"

    - id: "shizhi"
      name: "💡智库-视知产研院"
      url: "https://my-rsshub-rust.vercel.app/zhihu/people/shi-zhi-chan-yan-yuan/posts"

    - id: "liuxuesheng"
      name: "💡智库-留学生日报"
      url: "https://my-rsshub-rust.vercel.app/zhihu/people/bei-mei-liu-xue-sheng-ri-bao/posts"

    - id: "xiaomasong"
      name: "💡智库-小马宋"
      url: "https://my-rsshub-rust.vercel.app/zhihu/people/xiao-ma-song/posts"





# ===============================================================
# 4. 报告模式与筛选策略
# ===============================================================
report:
  mode: "current"
  display_mode: "keyword"
  sort_by_position_first: false
  rank_threshold: 5
  max_news_per_keyword: 0

filter:
  method: "keyword"                  # 依然保持 AI 全盘掌控
  priority_sort_enabled: true

ai_filter:
  batch_size: 200
  batch_interval: 2
  min_score: 0.7
  reclassify_threshold: 0.6
  prompt_file: "prompt.txt"
  extract_prompt_file: "extract_prompt.txt"
  update_tags_prompt_file: "update_tags_prompt.txt"

# ===============================================================
# 5. 推送内容控制
# ===============================================================
display:
  region_order:
    - ai_analysis
    - new_items
    - hotlist
    - rss
    - standalone
  regions:
    hotlist: true
    new_items: false
    rss: true
    standalone: false
    ai_analysis: true
  standalone:
    platforms: []
    rss_feeds: []
    max_items: 20

# ===============================================================
# 6. 推送通知 (直连企业微信群)
# ===============================================================
notification:
  enabled: true
  channels:
    wework:
      webhook_url: ""  # 安全密钥占位符
      msg_type: "markdown"

# ===============================================================
# 7. 存储配置
# ===============================================================
storage:
  backend: "auto"
  formats:
    sqlite: true
    txt: false
    html: true
  local:
    data_dir: "output"
    retention_days: 0
  remote:
    retention_days: 0
    endpoint_url: ""
    bucket_name: ""
    access_key_id: ""
    secret_access_key: ""
    region: ""
  pull:
    enabled: false
    days: 7

# ===============================================================
# 8. AI 模型配置
# ===============================================================
ai:
  model: "deepseek/deepseek-chat"
  api_key: ""           # 安全密钥占位符
  api_base: "https://api.deepseek.com/v1"
  timeout: 120
  temperature: 1.0
  max_tokens: 5000
  num_retries: 1
  fallback_models: []

ai_analysis:
  enabled: true
  language: "Chinese"
  prompt_file: "ai_analysis_prompt.txt"
  mode: "follow_report"
  max_news_for_analysis: 150
  include_rss: true
  include_standalone: true
  include_rank_timeline: true

ai_translation:
  enabled: true
  language: "中文"
  prompt_file: "ai_translation_prompt.txt"
  scope:
    hotlist: false
    rss: true
    standalone: true

advanced:
  debug: false
  version_check_url: "https://raw.githubusercontent.com/sansan0/TrendRadar/refs/heads/master/version"
  mcp_version_check_url: "https://raw.githubusercontent.com/sansan0/TrendRadar/refs/heads/master/version_mcp"
  configs_version_check_url: "https://raw.githubusercontent.com/sansan0/TrendRadar/refs/heads/master/version_configs"
  crawler:
    request_interval: 2000
    use_proxy: false
    default_proxy: "http://127.0.0.1:10801"
  rss:
    request_interval: 1000
    timeout: 15
    use_proxy: false
    proxy_url: ""
  weight:
    rank: 0.6
    frequency: 0.3
    hotness: 0.1
  max_accounts_per_channel: 3
  batch_size:
    default: 4000
    wework: 4000
  batch_send_interval: 3
