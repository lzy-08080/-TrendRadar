# ═══════════════════════════════════════════════════════════════
#                    TrendRadar 配置文件 (全网商业与求职侦察版)
# ═══════════════════════════════════════════════════════════════

app:
  timezone: "Asia/Shanghai"
  show_version_update: true

schedule:
  enabled: false
  preset: "custom"      # 👈 把 "morning_evening" 改成 "custom"

# ===============================================================
# 2. 数据源 - 热榜平台 (精简保留高净值流量池)
# ===============================================================
platforms:
  enabled: true
  sources:
    - id: "bilibili-hot-search"
      name: "B站热搜"
    - id: "zhihu"
      name: "知乎"
    - id: "weibo"
      name: "微博"

# ===============================================================
# 3. 数据源 - RSS 订阅 (你的 15 大金牌智库)
# ===============================================================
rss:
  enabled: true
  freshness_filter:
    enabled: true
    max_age_days: 1

  feeds:
    - id: "36kr-ai"
      name: "💡智库-36氪前沿科技"
      url: "https://36kr.com/feed" # 🎯 36氪全网官方原生流，包含最全的行业及大模型动态

    - id: "huxiu-article"
      name: "💡智库-虎嗅精选"
      url: "https://my-rsshub-rust.vercel.app/huxiu/article"
      
    - id: "sv101"
      name: "💡智库-硅谷101"
      url: "https://feeds.fireside.fm/sv101/rss" # 🎯 官方原生海外音频流，无视任何反爬，Actions 秒过

    - id: "42zhangjing"
      name: "💡智库-42章经"
      url: "https://rsshub.moe/xiaoyuzhou/podcast/5e777556418a84a0461f3640" # 🎯 走海外 Actions 友好型专线镜像抓取播客动态

    - id: "xinzhiyuan"
      name: "💡智库-新智元"
      url: "https://rsshub.moe/zhihu/people/xin-zhi-yuan-84-75/posts" # 🎯 换用独立高可用海外节点，完美穿透知乎对 Actions 的 503 拦截

    - id: "deeptech"
      name: "💡智库-Deeptech深科技"
      url: "https://rsshub.moe/zhihu/people/deeptechshen-ke-ji/posts"

    - id: "jiazi"
      name: "💡智库-甲子光年"
      url: "https://rsshub.moe/zhihu/people/jia-zi-guang-nian/posts"

    - id: "metrodata"
      name: "📊智库-城市数据团"
      url: "https://rsshub.moe/36kr/user/5341257" # 🎯 降维打击：放弃死磕微信，改走其在 36氪的官方同步专栏，永不封锁



# ===============================================================
# 4. 报告模式与筛选策略
# ===============================================================
report:
  mode: "current"
  display_mode: "keyword"
  sort_by_position_first: false
  rank_threshold: 5
  max_news_per_keyword: 0

filter:
  method: "keyword"                  # 依然保持 AI 全盘掌控
  priority_sort_enabled: true

ai_filter:
  batch_size: 200
  batch_interval: 2
  min_score: 0.7
  reclassify_threshold: 0.6
  prompt_file: "prompt.txt"
  extract_prompt_file: "extract_prompt.txt"
  update_tags_prompt_file: "update_tags_prompt.txt"

# ===============================================================
# 5. 推送内容控制
# ===============================================================
display:
  region_order:
    - ai_analysis
    - new_items
    - hotlist
    - rss
    - standalone
  regions:
    hotlist: true
    new_items: false
    rss: true
    standalone: false
    ai_analysis: true
  standalone:
    platforms: []
    rss_feeds: []
    max_items: 20

# ===============================================================
# 6. 推送通知 (直连企业微信群)
# ===============================================================
notification:
  enabled: true
  channels:
    wework:
      webhook_url: ""  # 安全密钥占位符
      msg_type: "markdown"

# ===============================================================
# 7. 存储配置
# ===============================================================
storage:
  backend: "auto"
  formats:
    sqlite: true
    txt: false
    html: true
  local:
    data_dir: "output"
    retention_days: 0
  remote:
    retention_days: 0
    endpoint_url: ""
    bucket_name: ""
    access_key_id: ""
    secret_access_key: ""
    region: ""
  pull:
    enabled: false
    days: 7

# ===============================================================
# 8. AI 模型配置
# ===============================================================
ai:
  model: "deepseek/deepseek-chat"
  api_key: ""           # 安全密钥占位符
  api_base: "https://api.deepseek.com/v1"
  timeout: 120
  temperature: 1.0
  max_tokens: 5000
  num_retries: 1
  fallback_models: []

ai_analysis:
  enabled: true
  language: "Chinese"
  prompt_file: "ai_analysis_prompt.txt"
  mode: "follow_report"
  max_news_for_analysis: 150
  include_rss: true
  include_standalone: true
  include_rank_timeline: true

ai_translation:
  enabled: true
  language: "中文"
  prompt_file: "ai_translation_prompt.txt"
  scope:
    hotlist: false
    rss: true
    standalone: true

advanced:
  debug: false
  version_check_url: "https://raw.githubusercontent.com/sansan0/TrendRadar/refs/heads/master/version"
  mcp_version_check_url: "https://raw.githubusercontent.com/sansan0/TrendRadar/refs/heads/master/version_mcp"
  configs_version_check_url: "https://raw.githubusercontent.com/sansan0/TrendRadar/refs/heads/master/version_configs"
  crawler:
    request_interval: 2000
    use_proxy: false
    default_proxy: "http://127.0.0.1:10801"
  rss:
    request_interval: 1000
    timeout: 15
    use_proxy: false
    proxy_url: ""
  weight:
    rank: 0.6
    frequency: 0.3
    hotness: 0.1
  max_accounts_per_channel: 3
  batch_size:
    default: 4000
    wework: 4000
  batch_send_interval: 3
