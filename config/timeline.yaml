# ═══════════════════════════════════════════════════════════════
#                    TrendRadar 时间线配置 (BPC运营实习生专用)
#                      Version: 1.2.0
# ═══════════════════════════════════════════════════════════════

presets:
  always_on:
    name: "全天监控"
    description: "全天候监控，有新增立即推送。适合重度用户。"
    default:
      collect: true
      analyze: false
      ai_mode: "current"
      push: true
      report_mode: "incremental"
      once:
        analyze: false
        push: false
    periods: {}
    day_plans:
      all_day:
        periods: []
    week_map:
      1: "all_day"
      2: "all_day"
      3: "all_day"
      4: "all_day"
      5: "all_day"
      6: "all_day"
      7: "all_day"

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
#                  BPC 运营专属自定义模式（积木搭建）
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
custom:
  name: "BPC运营专属时间线"
  description: "完美贴合09:30到岗、17:30下班的硬核运营节奏，定点推送。"

  default:
    collect: true
    analyze: false
    ai_mode: "current"
    push: false                    # 静默期绝对不推送
    report_mode: "current"
    once:
      analyze: true
      push: true

  periods:
    deep_quiet:
      name: "深夜静默"
      start: "23:00"
      end: "06:00"
      push: false

    bpc_morning:
      name: "早间定点推送"
      start: "9:28"
      end: "9:32"                  # 窄窗口保证在9:30准时触发一次
      analyze: true
      ai_mode: "current"
      push: true
      report_mode: "current"

    bpc_evening:
      name: "下班前全天大汇总"
      start: "17:28"
      end: "17:32"                 # 17:30准时触发一次
      analyze: true
      ai_mode: "daily"
      push: true
      report_mode: "daily"

    weekend_free:
      name: "周末增量自由推"
      start: "10:00"
      end: "22:00"
      push: true
      report_mode: "incremental"

  day_plans:
    workday:
      # 只保留静默 + 早晚两次定点推送，去掉无效的 bpc_noon
      periods: ["deep_quiet", "bpc_morning", "bpc_evening"]
    weekend:
      periods: ["deep_quiet", "weekend_free"]

  week_map:
    1: "workday"
    2: "workday"
    3: "workday"
    4: "workday"
    5: "workday"
    6: "weekend"
    7: "weekend"

  overlap:
    policy: "error_on_overlap"
